<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="batGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A76A"/>
      <stop offset="100%" stop-color="#A67C52"/>
    </linearGradient>
  </defs>

  <!-- Cricket Ball (small) -->
  <circle cx="16" cy="32" r="9" fill="#CC3333"/>
  <circle cx="16" cy="32" r="8.5" fill="none" stroke="#E64545" stroke-width="0.4"/>
  <path d="M11 25 C13.5 29, 13.5 35, 11 39" fill="none" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M21 25 C18.5 29, 18.5 35, 21 39" fill="none" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="10" y1="27" x2="11.8" y2="27.7" stroke="#FFF" stroke-width="0.4"/>
  <line x1="9.8" y1="30" x2="11.5" y2="30.5" stroke="#FFF" stroke-width="0.4"/>
  <line x1="9.8" y1="33" x2="11.5" y2="33.5" stroke="#FFF" stroke-width="0.4"/>
  <line x1="10" y1="36" x2="11.8" y2="36.3" stroke="#FFF" stroke-width="0.4"/>
  <line x1="20.2" y1="27.7" x2="22" y2="27" stroke="#FFF" stroke-width="0.4"/>
  <line x1="20.5" y1="30.5" x2="22.2" y2="30" stroke="#FFF" stroke-width="0.4"/>
  <line x1="20.5" y1="33.5" x2="22.2" y2="33" stroke="#FFF" stroke-width="0.4"/>
  <line x1="20.2" y1="36.3" x2="22" y2="36" stroke="#FFF" stroke-width="0.4"/>
  <ellipse cx="13.5" cy="28" rx="2" ry="1.3" fill="#FFFFFF" opacity="0.12" transform="rotate(-20 13.5 28)"/>

  <!-- Cricket Bat (small, angled) -->
  <g transform="translate(30, 14) rotate(15, 7, 18)">
    <rect x="3" y="4" width="8" height="22" rx="1.5" fill="url(#batGrad)"/>
    <rect x="3" y="4" width="2" height="22" rx="0.8" fill="#E8C88A" opacity="0.4"/>
    <rect x="5" y="0" width="4" height="5.5" rx="1" fill="#5C4033"/>
    <line x1="5.3" y1="1" x2="8.7" y2="1" stroke="#3D2B1F" stroke-width="0.4"/>
    <line x1="5.3" y1="2.2" x2="8.7" y2="2.2" stroke="#3D2B1F" stroke-width="0.4"/>
    <line x1="5.3" y1="3.4" x2="8.7" y2="3.4" stroke="#3D2B1F" stroke-width="0.4"/>
    <rect x="3" y="25" width="8" height="2" rx="1" fill="#A67C52"/>
  </g>

  <!-- 3X text in teal, Bet in white -->
  <text x="56" y="44" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif" font-weight="900" font-size="36" letter-spacing="-1">
    <tspan fill="url(#tealGrad)">3X</tspan><tspan fill="#FFFFFF">Bet</tspan>
  </text>

  <!-- Teal gradient underline -->
  <rect x="56" y="50" width="130" height="2.5" rx="1.25" fill="url(#tealGrad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="56" y="61" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif" font-weight="700" font-size="9" fill="#9CA3AF" letter-spacing="3">INDIA'S #1 EXCHANGE</text>
</svg>
