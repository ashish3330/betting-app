      GOGC: "${GOGC:-100}"
      GOMAXPROCS: "${GOMAXPROCS:-2}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4318}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-lotus}:${POSTGRES_PASSWORD:-L0tus!Xchg2026}@postgres:5432/${POSTGRES_DB:-bettingdb}?sslmode=disable&search_path=auth,public"
      REDIS_URL: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-R3dis!Lotus2026}"
      NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
