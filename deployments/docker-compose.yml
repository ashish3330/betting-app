    environment:
      NEXT_PUBLIC_API_URL: "http://gateway:8080"
      NEXT_PUBLIC_WS_URL: "ws://gateway:8081"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
