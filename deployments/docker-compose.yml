  # ---------------------------------------------------------------
  # Grafana -- dashboards & alerting
  # ---------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-Gr4fana!Lotus2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - backend

  # ---------------------------------------------------------------
  # Jaeger -- distributed tracing (OTLP receiver + UI)
  # ---------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.55
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"  # Jaeger UI
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"  # OTLP HTTP receiver
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - backend

# ---------------------------------------------------------------
# Networks
# ---------------------------------------------------------------
networks:
  backend:
    driver: bridge
    name: lotus_backend
  frontend:
    driver: bridge
    name: lotus_frontend

# ---------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------
volumes:
  postgres_data:
    name: lotus_postgres_data
  redis_data:
    name: lotus_redis_data
  nats_data:
    name: lotus_nats_data
  clickhouse_data:
    name: lotus_clickhouse_data
  clickhouse_logs:
    name: lotus_clickhouse_logs
  prometheus_data:
    name: lotus_prometheus_data
  grafana_data:
    name: lotus_grafana_data
