version: '3.9'

services:
  # ---------------------------------------------------------------
  # PostgreSQL 16 with ltree extension and migration bootstrap
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bettingdb}
      POSTGRES_USER: ${POSTGRES_USER:-lotus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-L0tus!Xchg2026}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lotus} -d ${POSTGRES_DB:-bettingdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - backend
    shm_size: '256mb'

  # ---------------------------------------------------------------
  # Redis 7 -- LRU eviction, AOF persistence
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:-R3dis!Lotus2026}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-R3dis!Lotus2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - backend

  # ---------------------------------------------------------------
  # NATS with JetStream
  # ---------------------------------------------------------------
  nats:
    image: nats:2-alpine
    restart: unless-stopped
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    command: >
      --jetstream
        --store_dir /data
        --http_port 8222
        --max_payload 1MB
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 64M
    networks:
      - backend

  # ---------------------------------------------------------------
  # ClickHouse for analytics
  # ---------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-lotus_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-lotus}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-Cl1ck!Lotus2026}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.0'
        reservations:
          memory: 512M
    networks:
      - backend

  # ---------------------------------------------------------------
  # Gateway -- API gateway / reverse proxy
  # ---------------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    command: ["/app/gateway"]
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    env_file:
      - ../.env
    environment:
      HTTP_PORT: "8080"
      GOMEMLIMIT: "${GATEWAY_GOMEMLIMIT:-400MiB}"
      GOGC: "${GOGC:-100}"
      GOMAXPROCS: "${GOMAXPROCS:-2}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4318}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-lotus}:${POSTGRES_PASSWORD:-L0tus!Xchg2026}@postgres:5432/${POSTGRES_DB:-bettingdb}?sslmode=disable&search_path=betting,auth,public"
      REDIS_URL: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-R3dis!Lotus2026}"
      NATS_URL: "nats://nats:4222"
      CLICKHOUSE_URL: "tcp://clickhouse:9000"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      WALLET_SERVICE_URL: "http://wallet-service:8082"
      MATCHING_ENGINE_URL: "http://matching-engine:8083"
      PAYMENT_SERVICE_URL: "http://payment-service:8084"
      CASINO_SERVICE_URL: "http://casino-service:8085"
      ODDS_SERVICE_URL: "http://odds-service:8086"
      FRAUD_SERVICE_URL: "http://fraud-service:8087"
      REPORTING_SERVICE_URL: "http://reporting-service:8088"
      RISK_SERVICE_URL: "http://risk-service:8089"
      HIERARCHY_SERVICE_URL: "http://hierarchy-service:8090"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8091"
      ADMIN_SERVICE_URL: "http://admin-service:8092"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      auth-service:
        condition: service_started
      wallet-service:
        condition: service_started
      matching-engine:
        condition: service_started
      payment-service:
        condition: service_started
      casino-service:
        condition: service_started
      odds-service:
        condition: service_started
      fraud-service:
        condition: service_started
      reporting-service:
        condition: service_started
      risk-service:
        condition: service_started
      hierarchy-service:
        condition: service_started
      notification-service:
        condition: service_started
      admin-service:
        condition: service_started
    networks:
      - backend
      - frontend

