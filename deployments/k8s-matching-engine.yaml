apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
  namespace: lotus-exchange
  labels:
    app: matching-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: matching-engine
  template:
    metadata:
      labels:
        app: matching-engine
    spec:
      containers:
      - name: engine
        image: lotus-exchange/matching-engine:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 6060
          name: pprof
        env:
        - name: ODDS_PROVIDER
          value: "entity_sports"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: lotus-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: lotus-secrets
              key: redis-url
        - name: NATS_URL
          valueFrom:
            secretKeyRef:
              name: lotus-secrets
              key: nats-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: lotus-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: matching-engine
  namespace: lotus-exchange
spec:
  selector:
    app: matching-engine
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matching-engine-hpa
  namespace: lotus-exchange
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching-engine
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: active_ws_connections
      target:
        type: AverageValue
        averageValue: "5000"
